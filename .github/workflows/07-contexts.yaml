name: 07 - Contexts
run-name: 07 - Contexts | DEBUG - ${{ inputs.debug }}
on:
  push:
  workflow_dispatch:
    inputs:
      debug:
        type: boolean
        description: 'Run with debug logging'
        required: false
        default: false

jobs:
  echo-data:
    runs-on: ubuntu-latest
    steps:
      - name: Show Info
        run: |
          echo "Nombre del evento: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Flujo de trabajo: ${{ github.workflow }}"
          echo "ID de ejecución: ${{ github.run_id }}"
          echo "Número de ejecución: ${{ github.run_number }}"
      - name: Retrieve Variable
        run: |
            echo "El valor de la variable es: ${{ vars.MY_VAR }}"