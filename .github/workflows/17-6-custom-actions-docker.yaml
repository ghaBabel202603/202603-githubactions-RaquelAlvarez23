name: 17 - 6 - Custom Actions - Docker

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Name to greet'
        type: string
        default: 'World'

jobs:
  hello-to-you-docker:
    runs-on: ubuntu-latest
    outputs:
      greeting_time: ${{ steps.greet.outputs.time }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hello to You
        id: greet
        uses: ./.github/actions/hello-to-you-docker
        with:
          name: ${{ github.event.inputs.name }}

  get-the-time:
    runs-on: ubuntu-latest
    needs: hello-to-you-docker
    steps:
      - name: Show the time
        run: echo "The time was ${{ needs.hello-to-you-docker.outputs.greeting_time }}"
