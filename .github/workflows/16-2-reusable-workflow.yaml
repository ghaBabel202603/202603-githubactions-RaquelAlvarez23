name: 16 - 2 - Reusable Workflows

on:
  workflow_dispatch:

jobs:
  deploy:
    uses: RaquelAlvarez23/Curso-GitHub-workflows-CICD/.github/workflows/16-1-reusable-workflow.yaml@main
    with:
      target-directory: 'production-build'

  print-outputs:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Print outputs
        run: |
          echo "Build status: ${{ needs.deploy.outputs.build-status }}"
          echo "URL: ${{ needs.deploy.outputs.url }}"
